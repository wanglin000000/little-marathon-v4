<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
// ===== 强制版本检查 =====
(function() {
  const currentVersion = '2026042501';
  const storedVersion = localStorage.getItem('marathon_version');
  
  if (storedVersion && storedVersion !== currentVersion) {
    localStorage.clear();
    sessionStorage.clear();
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
  
  localStorage.setItem('marathon_version', currentVersion);
  
  Object.keys(localStorage).forEach(key => {
    if (key.includes('marathon')) localStorage.removeItem(key);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>管理员登录 - 小小马拉松</title>
  <script>
    window.APP_VERSION = '2026042502';
    // iOS Safari禁用Service Worker
    if (!('serviceWorker' in navigator) || /iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      console.log('iOS detected, skipping Service Worker');
    } else {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js?v=' + Date.now()).then(function() {
          console.log('Service Worker registered');
        }).catch(function(err) {
          console.log('SW registration failed:', err);
        });
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(76, 175, 80, 0.2);
    }
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      color: #1B5E20;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-login:active {
      transform: scale(0.98);
    }
    .error {
      color: #f44336;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #4CAF50;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🔐</div>
    <h1>管理员登录</h1>

    <div class="input-group">
      <label>管理员密码</label>
      <input type="password" id="password" placeholder="请输入管理员密码" maxlength="20">
    </div>

    <button class="btn-login" onclick="doLogin()">登录</button>

    <p class="error" id="errorMsg">密码错误，请重试</p>

    <a href="entry.html" class="back-link">返回参赛者入口</a>
  </div>

  <script>
    const ADMIN_PASSWORD = 'dxml2026';

    function doLogin() {
      const pwd = document.getElementById('password').value.trim();

      if (!pwd) {
        showError('请输入密码');
        return;
      }

      if (pwd === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_logged', 'true');
        window.location.href = 'dashboard.html';
      } else {
        showError('密码错误，请重试');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() {
        el.style.display = 'none';
      }, 3000);
    }

    // 回车登录
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        doLogin();
      }
    });
  </script>
</body>
</html>

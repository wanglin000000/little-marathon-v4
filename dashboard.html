<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
// ===== 强制版本检查 =====
(function() {
  const currentVersion = '2026042501';
  const storedVersion = localStorage.getItem('marathon_version');
  
  if (storedVersion && storedVersion !== currentVersion) {
    // 版本变更，强制刷新清除所有缓存
    localStorage.clear();
    sessionStorage.clear();
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
  
  localStorage.setItem('marathon_version', currentVersion);
  
  // 清除旧的 marathon_data
  Object.keys(localStorage).forEach(key => {
    if (key.includes('marathon')) localStorage.removeItem(key);
  });
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>管理后台 - 小小马拉松</title>
  <script>
    window.APP_VERSION = '2026042501';
    // Service Worker 已禁用 - 使用时间戳版本号彻底解决缓存
    window.FORCE_REFRESH = Date.now();
  </script>
</body>
</html>

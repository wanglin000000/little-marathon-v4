<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>小小马拉松 - 运动进行中</title>
  <script>window.APP_VERSION = '2026042401';
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js?v=' + Date.now()).then(function() {
        console.log('Service Worker registered');
      }).catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #E8F5E9;
      min-height: 100vh;
      padding-bottom: 120px;
    }
    /* 头部信息 */
    .header {
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    /* 背景图区域 */
    .banner-area {
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: linear-gradient(135deg, #4CAF50 0%, #81C784 50%, #A5D6A7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .banner-title {
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 8px;
    }
    .banner-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
    }
    .banner-img {
      display: none;
    }
    /* 用户信息 */
    .user-info {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      background: white;
      margin-bottom: 8px;
    }
    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #f0f0f0;
      margin-right: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-detail {
      flex: 1;
    }
    .user-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    .user-class {
      font-size: 14px;
      color: #666;
    }
    /* 统计卡片 */
    .stats-card {
      background: white;
      margin: 0 16px 16px;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .stat-item {
      text-align: center;
    }
    .stat-icon {
      font-size: 28px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #4CAF50;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .stat-divider {
      width: 1px;
      background: #eee;
    }
    /* 打卡地图 */
    .checkpoint-section {
      background: white;
      margin: 0 16px 16px;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkpoint-map {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
      position: relative;
    }
    .checkpoint-line {
      position: absolute;
      top: 20px;
      left: 40px;
      right: 40px;
      height: 3px;
      background: #ddd;
      z-index: 0;
    }
    .checkpoint-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }
    .cp-star {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid #ddd;
      transition: all 0.3s;
      cursor: pointer;
    }
    .cp-star.active {
      background: #FFD700;
      border-color: #FFA000;
      animation: starPulse 0.5s ease;
    }
    .cp-star.disabled {
      opacity: 0.5;
    }
    @keyframes starPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .cp-label {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
    }
    .cp-label.done {
      color: #4CAF50;
      font-weight: bold;
    }
    /* 控制按钮 */
    .control-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(232,245,233,1) 90%, transparent);
    }
    .btn-control {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s;
    }
    .btn-control:active {
      transform: scale(0.98);
    }
    .btn-start {
      background: linear-gradient(135deg, #FF9800, #FFB74D);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
    }
    .btn-end {
      background: linear-gradient(135deg, #f44336, #e57373);
      color: white;
      box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
    }
    .btn-finish {
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }
    /* 底部打卡面板 */
    .checkpoint-panel {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 24px 20px 40px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .checkpoint-panel.show {
      transform: translateY(0);
    }
    .panel-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .panel-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      text-align: center;
      margin-bottom: 8px;
    }
    .panel-hint {
      font-size: 14px;
      color: #999;
      text-align: center;
      margin-bottom: 20px;
    }
    .photo-area {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .photo-btn {
      flex: 1;
      padding: 14px;
      border: 2px dashed #ddd;
      border-radius: 12px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #666;
    }
    .photo-btn:active {
      background: #f0f0f0;
    }
    .photo-preview {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .panel-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-confirm {
      background: #4CAF50;
      color: white;
    }
    .btn-cancel {
      background: #f5f5f5;
      color: #666;
    }
    /* 加油提示弹窗 */
    .encourage-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: white;
      padding: 30px 40px;
      border-radius: 20px;
      text-align: center;
      z-index: 2000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .encourage-modal.show {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .encourage-icon {
      font-size: 60px;
      margin-bottom: 12px;
    }
    .encourage-text {
      font-size: 22px;
      font-weight: bold;
      color: #FF9800;
    }
    .encourage-step {
      font-size: 14px;
      color: #999;
      margin-top: 8px;
    }
    /* Toast提示 */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 3000;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    /* 遮罩层 */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .overlay.show {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <h1>🏃 第一届小小马拉松</h1>
    <p>北京幼师实验幼儿园定州园</p>
  </div>

  <!-- 背景图 -->
  <div class="banner-area">
    <div class="banner-title">🌱 雨润新芽 绿色地球</div>
    <div class="banner-subtitle">环保亲子运动会</div>
    <img src="背景.jpg" class="banner-img" alt="活动背景" onerror="this.style.display='none'">
  </div>

  <!-- 用户信息 -->
  <div class="user-info">
    <div class="user-avatar" id="userAvatar">
      <span>👤</span>
    </div>
    <div class="user-detail">
      <div class="user-name" id="userName">加载中...</div>
      <div class="user-class" id="userClass">加载中...</div>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-card">
    <div class="stat-item">
      <div class="stat-icon">⏱️</div>
      <div class="stat-value" id="countdown">59:59</div>
      <div class="stat-label">剩余时间</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-icon">👟</div>
      <div class="stat-value" id="stepCount">0</div>
      <div class="stat-label">当前步数</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-icon">⭐</div>
      <div class="stat-value" id="cpCount">0/7</div>
      <div class="stat-label">打卡进度</div>
    </div>
  </div>

  <!-- 打卡地图 -->
  <div class="checkpoint-section">
    <div class="section-title">📍 打卡地图</div>
    <div class="checkpoint-map">
      <div class="checkpoint-line"></div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-0" onclick="openCheckpoint(0)">⭐</div>
        <div class="cp-label" id="cp-label-0">起点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-1" onclick="openCheckpoint(1)">⭐</div>
        <div class="cp-label" id="cp-label-1">1号点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-2" onclick="openCheckpoint(2)">⭐</div>
        <div class="cp-label" id="cp-label-2">2号点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-3" onclick="openCheckpoint(3)">⭐</div>
        <div class="cp-label" id="cp-label-3">3号点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-4" onclick="openCheckpoint(4)">⭐</div>
        <div class="cp-label" id="cp-label-4">4号点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-5" onclick="openCheckpoint(5)">⭐</div>
        <div class="cp-label" id="cp-label-5">5号点</div>
      </div>
      <div class="checkpoint-item">
        <div class="cp-star disabled" id="cp-6" onclick="openCheckpoint(6)">🏁</div>
        <div class="cp-label" id="cp-label-6">终点</div>
      </div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="control-area">
    <button class="btn-control btn-start" id="btnControl" onclick="toggleGame()">
      🎬 开始比赛
    </button>
  </div>

  <!-- 打卡面板 -->
  <div class="overlay" id="cpOverlay" onclick="closeCheckpoint()"></div>
  <div class="checkpoint-panel" id="cpPanel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="cpPanelTitle">起点打卡</div>
    <div class="panel-hint">拍摄或选择照片完成打卡</div>
    <div class="photo-area">
      <div class="photo-btn" onclick="takePhoto()">
        <div class="photo-preview" id="photoPreview">
          <span>📷</span>
        </div>
        <span>拍照</span>
      </div>
      <div class="photo-btn" onclick="selectPhoto()">
        <div class="photo-preview">
          <span>📁</span>
        </div>
        <span>相册</span>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    <button class="panel-btn btn-confirm" id="btnConfirmCp" onclick="confirmCheckpoint()">
      ✅ 确认打卡
    </button>
    <button class="panel-btn btn-cancel" onclick="closeCheckpoint()">
      取消
    </button>
  </div>

  <!-- 加油提示 -->
  <div class="encourage-modal" id="encourageModal">
    <div class="encourage-icon">💪</div>
    <div class="encourage-text" id="encourageText">太棒了！继续保持！</div>
    <div class="encourage-step" id="encourageStep">已走 500 步</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== 全局状态 =====
    const STORAGE_KEY = 'marathon_data';
    const TOTAL_TIME = 3599; // 59:59 = 3599秒
    const CHECKPOINTS = ['起点', '1号点', '2号点', '3号点', '4号点', '5号点', '终点'];
    const ENCOURAGE_MESSAGES = [
      { step: 500, text: '太棒了！继续保持！' },
      { step: 1000, text: '加油！你真厉害！' },
      { step: 1500, text: '小小运动健将！' },
      { step: 2000, text: '坚持就是胜利！' },
      { step: 2500, text: '看看谁最厉害！' },
      { step: 3000, text: '你是最棒的！' },
      { step: 3500, text: '快要到终点了！' },
      { step: 4000, text: '最后冲刺！' },
      { step: 4500, text: '加油加油加油！' }
    ];

    let gameState = {
      isRunning: false,
      timeLeft: TOTAL_TIME,
      steps: 0,
      checkpoints: [false, false, false, false, false, false, false],
      checkpointPhotos: [null, null, null, null, null, null, null],
      currentCheckpoint: -1,
      lastEncourageStep: 0,
      startTime: null
    };

    let timerInterval = null;
    let stepInterval = null;
    let motionListener = null;
    let lastAcceleration = 0;
    let stepThreshold = 1.5; // 加速度阈值
    let lastStepTime = 0;

    // ===== 初始化 =====
    window.addEventListener('DOMContentLoaded', function() {
      loadState();
      loadUserInfo();
      updateUI();
    });

    function loadUserInfo() {
      const userInfo = localStorage.getItem('marathon_user_info');
      if (!userInfo) {
        window.location.href = 'entry.html';
        return;
      }

      const user = JSON.parse(userInfo);
      document.getElementById('userName').textContent = user.name || '小朋友';
      document.getElementById('userClass').textContent = (user.grade || '') + (user.className || '');

      const avatarEl = document.getElementById('userAvatar');
      if (user.avatar) {
        avatarEl.innerHTML = '<img src="' + user.avatar + '" alt="头像">';
      }
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          gameState = { ...gameState, ...data };
        } catch (e) {}
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
      // 同时保存到全局数据（供管理员查看）
      saveToGlobalData();
    }

    function saveToGlobalData() {
      const userInfo = JSON.parse(localStorage.getItem('marathon_user_info') || '{}');
      const globalData = JSON.parse(localStorage.getItem('marathon_global') || '{}');
      const userId = userInfo.userId || 'unknown';

      globalData[userId] = {
        name: userInfo.name,
        grade: userInfo.grade,
        className: userInfo.className,
        steps: gameState.steps,
        checkpoints: gameState.checkpoints,
        isFinished: gameState.checkpoints.filter(Boolean).length >= 7,
        finishTime: gameState.startTime,
        updateTime: Date.now()
      };

      localStorage.setItem('marathon_global', JSON.stringify(globalData));
    }

    // ===== UI更新 =====
    function updateUI() {
      // 倒计时
      const mins = Math.floor(gameState.timeLeft / 60);
      const secs = gameState.timeLeft % 60;
      document.getElementById('countdown').textContent =
        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

      // 步数
      document.getElementById('stepCount').textContent = gameState.steps;

      // 打卡进度
      const doneCount = gameState.checkpoints.filter(Boolean).length;
      document.getElementById('cpCount').textContent = doneCount + '/7';

      // 打卡星星状态
      for (let i = 0; i < 7; i++) {
        const star = document.getElementById('cp-' + i);
        const label = document.getElementById('cp-label-' + i);
        if (gameState.checkpoints[i]) {
          star.classList.add('active');
          star.classList.remove('disabled');
          label.classList.add('done');
          label.textContent = CHECKPOINTS[i] + ' ✓';
        } else {
          star.classList.remove('active');
          if (!gameState.isRunning) {
            star.classList.add('disabled');
          } else {
            star.classList.remove('disabled');
          }
          label.classList.remove('done');
          label.textContent = CHECKPOINTS[i];
        }
      }

      // 控制按钮
      updateControlButton();
    }

    function updateControlButton() {
      const btn = document.getElementById('btnControl');
      if (gameState.isRunning) {
        btn.className = 'btn-control btn-end';
        btn.innerHTML = '🏁 结束比赛';
      } else if (gameState.checkpoints.filter(Boolean).length >= 7) {
        btn.className = 'btn-control btn-finish';
        btn.innerHTML = '🎉 查看成绩';
        btn.onclick = function() {
          window.location.href = 'finish.html';
        };
      } else {
        btn.className = 'btn-control btn-start';
        btn.innerHTML = '🎬 开始比赛';
        btn.onclick = toggleGame;
      }
    }

    // ===== 游戏控制 =====
    function toggleGame() {
      if (gameState.isRunning) {
        stopGame();
      } else {
        startGame();
      }
    }

    function startGame() {
      gameState.isRunning = true;
      gameState.startTime = Date.now();
      saveState();

      // 开始倒计时
      timerInterval = setInterval(function() {
        gameState.timeLeft--;
        if (gameState.timeLeft <= 0) {
          gameState.timeLeft = 0;
          showToast('⏰ 时间到！比赛结束！');
          stopGame();
          setTimeout(function() {
            window.location.href = 'finish.html';
          }, 1500);
        }
        updateUI();
        saveState();
      }, 1000);

      // 开始步数统计
      startStepCounting();

      updateUI();
      showToast('🏃 比赛开始！加油！');
    }

    function stopGame() {
      gameState.isRunning = false;
      clearInterval(timerInterval);
      stopStepCounting();
      saveState();
      updateUI();

      if (gameState.checkpoints.filter(Boolean).length >= 7) {
        window.location.href = 'finish.html';
      }
    }

    // ===== 步数统计（带防作弊）=====
    let motionAvailable = false;
    
    function startStepCounting() {
      if (typeof DeviceMotionEvent !== 'undefined') {
        // iOS 13+ 需要请求权限
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission()
            .then(function(response) {
              if (response === 'granted') {
                motionAvailable = addMotionListener();
              }
            })
            .catch(function(e) {
              console.log('DeviceMotion permission denied');
            });
        } else {
          motionAvailable = addMotionListener();
        }
      }
    }

    function addMotionListener() {
      let stepCount = 0;
      let lastShakeTime = 0;
      
      motionListener = function(event) {
        const acc = event.accelerometerIncludingGravity;
        if (!acc) return;

        const totalAcc = Math.sqrt(
          acc.x * acc.x + acc.y * acc.y + acc.z * acc.z
        );
        const delta = Math.abs(totalAcc - 9.8); // 减去重力加速度
        const now = Date.now();

        // 阈值检测：检测明显晃动（走路时的震动）
        // 静止时delta约0-0.5，走路时delta约1-3
        if (delta > 2.0 && (now - lastStepTime) > 300) {
          stepCount++;
          // 连续3次明显晃动才计为1步（防止误触）
          if (stepCount >= 3) {
            gameState.steps++;
            lastStepTime = now;
            stepCount = 0;
            checkEncourage();
            updateUI();
            saveState();
          }
        } else if (delta < 1.0) {
          // 手机静止时重置计数器
          stepCount = Math.max(0, stepCount - 1);
        }

        lastAcceleration = totalAcc;
      };

      window.addEventListener('devicemotion', motionListener);
      return true;
    }

    function stopStepCounting() {
      if (motionListener) {
        window.removeEventListener('devicemotion', motionListener);
        motionListener = null;
      }
      // 移除模拟步数的interval（如果存在）
      if (window.stepIntervalId) {
        clearInterval(window.stepIntervalId);
        window.stepIntervalId = null;
      }
    }

    // ===== 加油提示 =====
    function checkEncourage() {
      for (let i = ENCOURAGE_MESSAGES.length - 1; i >= 0; i--) {
        if (gameState.steps >= ENCOURAGE_MESSAGES[i].step && gameState.lastEncourageStep < ENCOURAGE_MESSAGES[i].step) {
          gameState.lastEncourageStep = ENCOURAGE_MESSAGES[i].step;
          showEncourage(ENCOURAGE_MESSAGES[i].text, ENCOURAGE_MESSAGES[i].step);
          break;
        }
      }
    }

    function showEncourage(text, step) {
      const modal = document.getElementById('encourageModal');
      document.getElementById('encourageText').textContent = text;
      document.getElementById('encourageStep').textContent = '已走 ' + step + ' 步';
      modal.classList.add('show');

      setTimeout(function() {
        modal.classList.remove('show');
      }, 2000);
    }

    // ===== 打卡功能 =====
    function openCheckpoint(idx) {
      if (!gameState.isRunning) {
        showToast('请先开始比赛');
        return;
      }
      if (gameState.checkpoints[idx]) {
        showToast('已完成打卡！');
        return;
      }

      gameState.currentCheckpoint = idx;
      document.getElementById('cpPanelTitle').textContent = CHECKPOINTS[idx] + '打卡';
      document.getElementById('cpOverlay').classList.add('show');
      document.getElementById('cpPanel').classList.add('show');
      document.getElementById('photoPreview').innerHTML = '<span>📷</span>';
    }

    function closeCheckpoint() {
      document.getElementById('cpOverlay').classList.remove('show');
      document.getElementById('cpPanel').classList.remove('show');
      gameState.currentCheckpoint = -1;
    }

    function takePhoto() {
      var input = document.getElementById('photoInput');
      // 直接设置并点击，不延迟
      input.setAttribute('accept', 'image/*');
      input.setAttribute('capture', 'camera');
      input.removeAttribute('multiple');
      try {
        input.click();
      } catch(e) {
        // 微信环境兼容
        var evt = document.createEvent('MouseEvents');
        evt.initEvent('click', true, true);
        input.dispatchEvent(evt);
      }
    }

    function selectPhoto() {
      var input = document.getElementById('photoInput');
      // 移除capture属性，允许选择相册
      input.setAttribute('accept', 'image/*');
      input.removeAttribute('capture');
      try {
        input.click();
      } catch(e) {
        // 微信环境兼容
        var evt = document.createEvent('MouseEvents');
        evt.initEvent('click', true, true);
        input.dispatchEvent(evt);
      }
    }

    document.getElementById('photoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        gameState.checkpointPhotos[gameState.currentCheckpoint] = ev.target.result;
        document.getElementById('photoPreview').innerHTML =
          '<img src="' + ev.target.result + '" alt="照片预览">';
      };
      reader.readAsDataURL(file);
    });

    function confirmCheckpoint() {
      const idx = gameState.currentCheckpoint;

      // 必须上传照片
      if (!gameState.checkpointPhotos[idx]) {
        showToast('请先拍摄或选择照片');
        return;
      }

      // 完成打卡
      gameState.checkpoints[idx] = true;
      saveState();
      closeCheckpoint();

      // 显示成功
      showToast('🎉 ' + CHECKPOINTS[idx] + '打卡成功！');
      updateUI();

      // 检查是否全部完成
      if (gameState.checkpoints.filter(Boolean).length >= 7) {
        setTimeout(function() {
          showToast('🎊 全部打卡完成！准备冲刺终点！');
        }, 1000);
      }

      // 重置照片输入
      document.getElementById('photoInput').value = '';
    }

    // ===== Toast提示 =====
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2000);
    }

    // ===== 页面可见性变化（后台运行支持）=====
    document.addEventListener('visibilitychange', function() {
      if (document.hidden && gameState.isRunning) {
        // 页面隐藏时保存状态
        saveState();
      } else if (!document.hidden) {
        // 页面恢复时更新UI
        loadState();
        updateUI();
      }
    });

    // ===== 后退处理 =====
    window.addEventListener('beforeunload', function() {
      saveState();
    });
  </script>
</body>
</html>

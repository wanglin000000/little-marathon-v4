<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>完赛证书 - 小小马拉松</title>
  <script>window.APP_VERSION = '2026042401';
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js?v=' + Date.now()).then(function() {
        console.log('Service Worker registered');
      }).catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }
    /* 奖杯区域 */
    .trophy-section {
      text-align: center;
      padding: 30px 20px;
      background: white;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.15);
    }
    .trophy-icon {
      font-size: 100px;
      animation: trophyFloat 2s ease-in-out infinite;
    }
    @keyframes trophyFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .congrats-text {
      font-size: 28px;
      font-weight: bold;
      color: #1B5E20;
      margin: 16px 0 8px;
    }
    .child-name {
      font-size: 32px;
      font-weight: bold;
      color: #FF9800;
      margin-bottom: 16px;
    }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #4CAF50;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
    }
    /* 照片墙 */
    .photo-section {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .photo-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-item .placeholder {
      font-size: 24px;
      color: #ccc;
    }
    .photo-label {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 4px;
    }
    /* 分享按钮 */
    .share-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(232,245,233,1) 90%, transparent);
    }
    .btn-share {
      width: 100%;
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }
    .btn-share:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background: white;
      color: #4CAF50;
      border: 2px solid #4CAF50;
      margin-top: 12px;
    }
    /* Canvas（隐藏）*/
    #shareCanvas {
      position: fixed;
      top: -9999px;
      left: -9999px;
    }
    /* 加载状态 */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-icon {
      font-size: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- 加载状态 -->
  <div class="loading" id="loading">
    <div class="loading-icon">⏳</div>
    <div class="loading-text">正在生成证书...</div>
  </div>

  <!-- 奖杯区域 -->
  <div class="trophy-section">
    <div class="trophy-icon">🏆</div>
    <div class="congrats-text">恭喜完赛！</div>
    <div class="child-name" id="childName">小小运动员</div>
    <p style="color: #666; font-size: 14px;">成功完成第一届小小马拉松</p>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-value" id="totalSteps">0</div>
        <div class="stat-label">总步数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalTime">00:00</div>
        <div class="stat-label">用时</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">7/7</div>
        <div class="stat-label">打卡完成</div>
      </div>
    </div>
  </div>

  <!-- 打卡照片 -->
  <div class="photo-section">
    <div class="section-title">📸 打卡记录</div>
    <div class="photo-grid" id="photoGrid">
      <!-- 照片将由JS动态生成 -->
    </div>
  </div>

  <!-- 分享按钮 -->
  <div class="share-section">
    <button class="btn-share" id="btnShare" onclick="shareToFriends()">
      📤 一键分享朋友圈
    </button>
    <button class="btn-share btn-secondary" onclick="shareImage()">
      💾 保存到相册
    </button>
  </div>

  <!-- Canvas -->
  <canvas id="shareCanvas" width="1080" height="1920"></canvas>

  <script>
    const CHECKPOINTS = ['起点', '1号点', '2号点', '3号点', '4号点', '5号点', '终点'];

    let gameData = null;
    let userInfo = null;

    window.addEventListener('DOMContentLoaded', function() {
      loadData();
      renderUI();
      document.getElementById('loading').style.display = 'none';
    });

    function loadData() {
      userInfo = JSON.parse(localStorage.getItem('marathon_user_info') || '{}');
      gameData = JSON.parse(localStorage.getItem('marathon_data') || '{}');
    }

    function renderUI() {
      // 显示姓名
      document.getElementById('childName').textContent = userInfo.name || '小小运动员';

      // 显示步数
      document.getElementById('totalSteps').textContent = gameData.steps || 0;

      // 计算用时
      const totalSeconds = 3599 - (gameData.timeLeft || 0);
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      document.getElementById('totalTime').textContent =
        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

      // 渲染照片
      renderPhotos();
    }

    function renderPhotos() {
      const grid = document.getElementById('photoGrid');
      const photos = gameData.checkpointPhotos || [];

      for (let i = 0; i < 7; i++) {
        const item = document.createElement('div');
        item.className = 'photo-item';

        if (photos[i]) {
          item.innerHTML = '<img src="' + photos[i] + '" alt="' + CHECKPOINTS[i] + '">';
        } else {
          item.innerHTML = '<span class="placeholder">📷</span>';
        }

        grid.appendChild(item);

        // 添加标签
        const label = document.createElement('div');
        label.className = 'photo-label';
        label.textContent = CHECKPOINTS[i];
        grid.appendChild(label);
      }
    }

    // ===== 生成分享图片 =====
    function generateShareImage() {
      return new Promise(function(resolve) {
        const canvas = document.getElementById('shareCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1080;
        const H = 1920;

        // 尝试加载背景图
        const bgImg = new Image();
        bgImg.crossOrigin = 'anonymous';
        bgImg.onload = function() {
          ctx.drawImage(bgImg, 0, 0, W, H);
          drawContent(ctx, W, H);
          resolve(canvas.toDataURL('image/png'));
        };
        bgImg.onerror = function() {
          // 使用渐变背景
          const gradient = ctx.createLinearGradient(0, 0, 0, H);
          gradient.addColorStop(0, '#4CAF50');
          gradient.addColorStop(0.5, '#81C784');
          gradient.addColorStop(1, '#C8E6C9');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, W, H);

          // 添加装饰
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          for (var i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 50 + 20, 0, Math.PI * 2);
            ctx.fill();
          }

          drawContent(ctx, W, H);
          resolve(canvas.toDataURL('image/png'));
        };
        bgImg.src = '背景.jpg';
      });
    }

    function drawContent(ctx, W, H) {
      const centerX = W / 2;

      // 顶部标题
      ctx.fillStyle = '#1B5E20';
      ctx.font = 'bold 48px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('第一届小小马拉松', centerX, 120);

      ctx.fillStyle = '#4CAF50';
      ctx.font = '32px sans-serif';
      ctx.fillText('北京幼师实验幼儿园定州园', centerX, 170);

      // 奖杯
      ctx.font = '180px sans-serif';
      ctx.fillText('🏆', centerX, 450);

      // 恭喜文字
      ctx.fillStyle = '#1B5E20';
      ctx.font = 'bold 56px sans-serif';
      ctx.fillText('恭喜完赛！', centerX, 540);

      // 姓名
      ctx.fillStyle = '#FF9800';
      ctx.font = 'bold 72px sans-serif';
      const name = userInfo?.name || '小小运动员';
      ctx.fillText(name, centerX, 650);

      ctx.fillStyle = '#666';
      ctx.font = '36px sans-serif';
      ctx.fillText('成功完成小小马拉松挑战', centerX, 720);

      // 统计信息
      const statsY = 850;
      ctx.fillStyle = '#fff';
      roundRect(ctx, 80, statsY, 920, 200, 20, '#4CAF50');

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 64px sans-serif';
      ctx.fillText(gameData?.steps || 0, centerX - 200, statsY + 90);
      ctx.font = '28px sans-serif';
      ctx.fillText('总步数', centerX - 200, statsY + 140);

      ctx.font = 'bold 64px sans-serif';
      const totalSeconds = 3599 - (gameData?.timeLeft || 0);
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      const timeStr = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      ctx.fillText(timeStr, centerX, statsY + 90);
      ctx.font = '28px sans-serif';
      ctx.fillText('用时', centerX, statsY + 140);

      ctx.font = 'bold 64px sans-serif';
      ctx.fillText('7/7', centerX + 200, statsY + 90);
      ctx.font = '28px sans-serif';
      ctx.fillText('打卡', centerX + 200, statsY + 140);

      // 打卡照片
      const photoY = 1100;
      ctx.fillStyle = '#1B5E20';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('📸 打卡记录', 40, photoY);

      const photos = gameData?.checkpointPhotos || [];
      const photoSize = (W - 160) / 4 - 16;
      const startY = photoY + 30;

      for (let i = 0; i < 7; i++) {
        const row = Math.floor(i / 4);
        const col = i % 4;
        const x = 40 + col * (photoSize + 16);
        const y = startY + row * (photoSize + 60);

        // 照片背景
        roundRect(ctx, x, y, photoSize, photoSize, 12, '#ddd');

        if (photos[i]) {
          try {
            const img = new Image();
            img.src = photos[i];
            ctx.save();
            roundRect(ctx, x, y, photoSize, photoSize, 12, null, true);
            ctx.clip();
            ctx.drawImage(img, x, y, photoSize, photoSize);
            ctx.restore();
          } catch (e) {
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(x, y, photoSize, photoSize);
            ctx.font = '48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('📷', x + photoSize/2, y + photoSize/2 + 16);
          }
        } else {
          ctx.fillStyle = '#f5f5f5';
          ctx.fillRect(x, y, photoSize, photoSize);
          ctx.font = '48px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('📷', x + photoSize/2, y + photoSize/2 + 16);
        }

        // 标签
        ctx.fillStyle = '#666';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(CHECKPOINTS[i], x + photoSize/2, y + photoSize + 30);
      }

      // 底部信息
      const footerY = H - 200;
      ctx.fillStyle = '#81C784';
      ctx.font = '28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🌱 雨润新芽 绿色地球', centerX, footerY);
      ctx.fillText('让运动成为习惯 · 让童年充满活力', centerX, footerY + 50);

      // 二维码提示
      ctx.fillStyle = '#999';
      ctx.font = '24px sans-serif';
      ctx.fillText('长按识别二维码参与活动', centerX, footerY + 120);
    }

    function roundRect(ctx, x, y, w, h, r, color, clip) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (color) ctx.fillStyle = color;
      if (!clip) ctx.fill();
    }

    // ===== 分享功能 =====
    async function shareToFriends() {
      document.getElementById('btnShare').innerHTML = '⏳ 正在生成...';

      try {
        const dataUrl = await generateShareImage();

        // 在页面上显示分享图片预览，提示用户长按保存
        showSharePreview(dataUrl);
        
      } catch (e) {
        console.error('Share error:', e);
        showToast('生成失败，请重试');
      }

      document.getElementById('btnShare').innerHTML = '📤 一键分享朋友圈';
    }

    function showSharePreview(dataUrl) {
      // 创建分享预览弹窗
      var overlay = document.createElement('div');
      overlay.id = 'shareOverlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
      
      overlay.innerHTML = 
        '<div style="color:white;text-align:center;margin-bottom:20px;font-size:18px;">' +
        '<p style="margin-bottom:10px;">🎉 恭喜完成小小马拉松！</p>' +
        '<p style="color:#FFD700;font-size:20px;font-weight:bold;">' + (userInfo?.name || '小小运动员') + '</p>' +
        '</div>' +
        '<img src="' + dataUrl + '" style="max-width:100%;max-height:60vh;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);" id="sharePreviewImg">' +
        '<div style="color:white;text-align:center;margin-top:20px;font-size:16px;line-height:1.8;">' +
        '<p style="color:#4CAF50;font-weight:bold;">📱 分享到朋友圈</p>' +
        '<p>1. 长按上方图片保存到相册</p>' +
        '<p>2. 打开微信朋友圈</p>' +
        '<p>3. 发布动态并添加这张图片</p>' +
        '</div>' +
        '<button onclick="closeSharePreview()" style="margin-top:20px;padding:12px 40px;background:#4CAF50;color:white;border:none;border-radius:25px;font-size:16px;">知道了</button>';
      
      document.body.appendChild(overlay);
    }

    function closeSharePreview() {
      var overlay = document.getElementById('shareOverlay');
      if (overlay) {
        overlay.remove();
      }
    }

    async function shareImage() {
      try {
        const dataUrl = await generateShareImage();
        // 弹出预览让用户保存
        showSharePreview(dataUrl);
      } catch (e) {
        console.error('Save error:', e);
        showToast('保存失败，请重试');
      }
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:16px 32px;border-radius:8px;z-index:10000;font-size:16px;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.remove();
      }, 2000);
    }
  </script>
</body>
</html>
